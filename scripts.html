<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository - LS Airdrop</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        tech: {
                            900: '#0a0a0a',
                            800: '#171717',
                            700: '#262626',
                            muted: '#a3a3a3',
                            accent: '#e5e5e5'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }

        .tech-card {
            background-color: #0a0a0a;
            border: 1px solid #262626;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        
        .tech-card:hover {
            border-color: #525252;
        }

        .btn-minimal {
            background-color: #e5e5e5;
            color: #0a0a0a;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .btn-minimal:hover {
            background-color: #ffffff;
            transform: translateY(-1px);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #525252; }
    </style>
</head>
<body class="antialiased selection:bg-gray-800 selection:text-white">

    <!-- Subtle Grid Background -->
    <div class="fixed inset-0 bg-grid pointer-events-none z-0"></div>

    <!-- Navigation (Disederhanakan untuk page repo) -->
    <nav class="fixed w-full z-40 top-0 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-[#262626]" id="navbar">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <a href="/" class="flex-shrink-0 flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <span class="font-mono font-bold text-lg tracking-tight text-white">LS_AIRDROP<span class="text-gray-500">/</span></span>
                </a>
                
                <!-- Desktop & Mobile: Back to Home -->
                <div class="flex space-x-8 items-center font-mono text-sm">
                    <a href="/" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left text-xs"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </nav>

<section class="pt-32 pb-24 relative z-10 min-h-screen">
        <div class="max-w-6xl mx-auto px-6">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
                <div>
                    <h1 class="text-4xl font-medium tracking-tight text-white mb-2">All Scripts</h1>
                    <p class="text-gray-400 font-light text-sm">Gudang penyimpanan seluruh script automasi LS Airdrop.</p>
                </div>
                
                <div class="relative w-full md:w-72 font-mono">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"><i class="fa-solid fa-search text-xs"></i></span>
                    <input type="text" id="searchInput" class="w-full bg-[#171717] border border-[#262626] rounded-sm py-2 pl-9 pr-4 text-white text-xs focus:outline-none focus:border-[#525252] transition-colors" placeholder="Cari script atau bahasa...">
                </div>
            </div>

            <div id="repo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-700">
                </div>
            
            <div id="no-result" class="hidden text-center py-20 text-gray-500 font-mono text-sm mt-8">
                <i class="fa-solid fa-ghost text-2xl mb-3 block opacity-50"></i>
                <p>Script tidak ditemukan.</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-[#171717] py-8 z-10 relative">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 font-mono text-xs text-gray-600">
            <div>
                LS_AIRDROP // 2024
            </div>
            <div class="flex gap-6">
                <a href="#" class="hover:text-white transition-colors">Terms</a>
                <a href="#" class="hover:text-white transition-colors">Privacy</a>
                <a href="#" class="hover:text-white transition-colors">Github</a>
            </div>
        </div>
    </footer>

    <!-- Auth Modal (Sama persis dengan index.html) -->
    <div id="auth-modal" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-[#0a0a0a]/80 backdrop-blur-md" onclick="closeAuthModal()"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-sm px-4">
            <div class="bg-[#0a0a0a] border border-[#262626] rounded-sm p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-terminal text-gray-400 text-xs"></i>
                        <h3 class="text-white font-mono text-sm tracking-tight">SECURITY_CHECK</h3>
                    </div>
                    <button onclick="closeAuthModal()" class="text-gray-500 hover:text-white transition-colors focus:outline-none">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-400 text-[10px] uppercase tracking-widest font-mono mb-2">INPUT YOUR KEY:</label>
                    <div class="relative font-mono">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">></span>
                        <input type="password" id="auth-key-input" class="w-full bg-[#171717] border border-[#262626] rounded-sm py-2.5 pl-8 pr-4 text-white text-sm focus:outline-none focus:border-[#525252] transition-colors" placeholder="****" autocomplete="off" onkeypress="handleAuthKeyPress(event)">
                    </div>
<div class="mt-3 text-[10px] font-mono flex justify-between items-center h-4">
    <span id="auth-status" class="text-gray-600">Dapatkan key dari Bot Telegram</span>
    <a id="bot-link" href="https://t.me/betatestlsbot" target="_blank" class="text-gray-500 hover:text-[#0088cc] transition-colors flex items-center gap-1">
        <i class="fa-brands fa-telegram"></i> @betatestlsbot
    </a>
</div>
                </div>
                
                <button id="btn-verify" onclick="verifyKey()" class="w-full btn-minimal py-2.5 rounded-sm uppercase tracking-wider text-xs font-mono flex justify-center items-center gap-2 focus:outline-none">
                    Execute Handshake
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts (Search logic & Modal Auth logic) -->

<script>
        // --- 1. Deklarasi Wadah Data ---
        let repoData = [];

        // --- 2. Mengambil Data dari Server (Firebase via API) ---
        async function fetchScripts() {
            try {
                // PENTING: Jika bot/server sudah jalan di VPS, ganti localhost ini dengan IP VPS kamu
                // Contoh: fetch('http://192.168.1.1:3000/api/scripts')
                const response = await fetch('/api/scripts');
                repoData = await response.json();
                
                // Setelah data berhasil diambil, jalankan fungsi pembuat Card
                renderCards();
            } catch (error) {
                console.error("Gagal memuat data dari server:", error);
                const grid = document.getElementById('repo-grid');
                if (grid) {
                    grid.innerHTML = '<p class="text-red-500 font-mono text-sm col-span-full text-center mt-10">> Database Offline: Gagal terhubung ke server.</p>';
                }
            }
        }

        // --- 3. Mesin Render Data Dinamis ---
        function renderCards() {
            const grid = document.getElementById('repo-grid');
            if (!grid) return;

            let html = '';
            
            // Cek apakah ini halaman index.html (Home)
            const isHomePage = window.location.pathname === '/';
            
            // Di Home cuma tampil 3, di scripts.html tampil semua
            const maxItems = isHomePage ? 3 : repoData.length;

            for (let i = 0; i < maxItems; i++) {
                if (!repoData[i]) break; 
                const item = repoData[i];

                // Menyiapkan ID Video. Jika di database belum ada 'youtubeId', pakai video default
                const ytId = item.youtubeId || "1F-25HsVE4Y";

                // Block HTML untuk embed video
                const videoEmbed = `
                <div class="my-4 border border-[#262626] p-1 bg-[#050505] rounded-sm group-hover:border-[#525252] transition-colors duration-200">
                    <div class="relative w-full aspect-video bg-[#0a0a0a]">
                        <iframe class="absolute top-0 left-0 w-full h-full rounded-sm opacity-80 group-hover:opacity-100 transition-opacity duration-300" 
                            src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1" 
                            title="${item.title} Tutorial" frameborder="0" 
                            allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
                        </iframe>
                    </div>
                </div>
                `;

                html += `
                <div class="tech-card p-6 rounded-sm flex flex-col h-full group script-item">
                    <div class="flex justify-between items-start mb-4">
                        <div class="text-gray-400"><i class="${item.icon} text-xl"></i></div>
                        <span class="px-2 py-0.5 text-[10px] font-mono border ${item.tagStyle} rounded-sm tag">${item.tag}</span>
                    </div>
                    
                    <h3 class="text-lg text-white font-medium mb-2 group-hover:text-blue-400 transition-colors title">${item.title}</h3>
                    
                    <p class="text-sm text-gray-400 font-light leading-relaxed mb-2 flex-grow desc">
                        ${item.desc}
                    </p>
                    
                    ${videoEmbed}

                    <div class="mt-auto pt-4 border-t border-[#171717] flex justify-between items-center gap-2">
                        <span class="text-xs font-mono text-gray-500 lang">${item.lang}</span>
                        <div class="flex gap-2">
                            <a href="https://youtu.be/${ytId}" target="_blank" class="btn-outline px-2.5 py-1.5 rounded-sm text-[10px] uppercase font-mono tracking-wider flex items-center gap-1.5" title="Tonton di YouTube">
                                <i class="fa-brands fa-youtube text-red-500"></i> Video
                            </a>
                            <button onclick="requestDownload('${item.downloadUrl}', '${item.id}')" class="btn-minimal px-3 py-1.5 rounded-sm text-[10px] uppercase font-mono tracking-wider flex items-center gap-2">
                                <i class="fa-solid fa-download"></i> Download
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }
            grid.innerHTML = html;
        }

        // --- 4. Jalankan Pengambilan Data Saat Halaman Dimuat ---
        fetchScripts();

        // --- 5. Search Logic (Otomatis berjalan hanya di scripts.html) ---
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('keyup', function() {
                let filter = this.value.toLowerCase();
                let cards = document.querySelectorAll('.script-item');
                let noResult = document.getElementById('no-result');
                let hasVisibleCard = false;

                cards.forEach(card => {
                    let title = card.querySelector('.title').innerText.toLowerCase();
                    let desc = card.querySelector('.desc').innerText.toLowerCase();
                    let lang = card.querySelector('.lang').innerText.toLowerCase();
                    let tag = card.querySelector('.tag').innerText.toLowerCase();

                    if(title.includes(filter) || desc.includes(filter) || lang.includes(filter) || tag.includes(filter)) {
                        card.style.display = "";
                        hasVisibleCard = true;
                    } else {
                        card.style.display = "none";
                    }
                });

                if(!hasVisibleCard) {
                    noResult.classList.remove('hidden');
                } else {
                    noResult.classList.add('hidden');
                }
            });
        }

        // --- 6. Modal & Decryption Logic (1 Code 1 Repo) ---
        const authModal = document.getElementById('auth-modal');
        const authInput = document.getElementById('auth-key-input');
        const authStatus = document.getElementById('auth-status');
        const verifyBtn = document.getElementById('btn-verify');
        
        let unlockedRepos = {}; 
        let pendingDownloadUrl = ''; 
        let currentRepoId = ''; 

       function requestDownload(url, repoId) {
            if (unlockedRepos[repoId]) {
                window.open(url, '_blank');
            } else {
                pendingDownloadUrl = url;
                currentRepoId = repoId;

                // 1. Mencari Judul Script secara otomatis dari data yang diload
                const scriptObj = repoData.find(item => item.id === repoId);
                const scriptTitle = scriptObj ? scriptObj.title : 'Script Rahasia';

                // 2. Mempercantik tombol Telegram (tanpa menampilkan ID)
                const botLink = document.getElementById('bot-link');
                if(botLink) {
                    // Link tujuannya TETAP menggunakan ID agar bot Telegram tidak bingung
                    botLink.href = `https://t.me/betatestlsbot?start=${repoId}`;
                    // Tapi teks yang dilihat user diubah jadi lebih profesional
                    botLink.innerHTML = `<i class="fa-brands fa-telegram text-[#0088cc]"></i> Ambil Key via Bot`;
                }

                // 3. Menampilkan Judul Script di bagian kiri (sebagai pengganti teks abu-abu)
                const authStatus = document.getElementById('auth-status');
                if(authStatus) {
                    authStatus.innerHTML = `Buka: <span class="text-white tracking-normal">${scriptTitle}</span>`;
                }

                openAuthModal();
            }
        }

        function openAuthModal() {
            authModal.classList.remove('hidden');
            void authModal.offsetWidth;
            authModal.classList.remove('opacity-0');
            authModal.classList.add('opacity-100');
            setTimeout(() => { authInput.focus(); }, 100);
        }

        function closeAuthModal() {
            authModal.classList.remove('opacity-100');
            authModal.classList.add('opacity-0');
            setTimeout(() => {
                authModal.classList.add('hidden');
                resetModalState();
            }, 300);
        }

        function resetModalState() {
            authInput.value = '';
            authInput.disabled = false;
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = 'Execute Handshake';
            authStatus.innerHTML = '<span class="text-gray-600">Dapatkan key dari Bot Telegram</span>';
        }

        function handleAuthKeyPress(e) {
            if (e.key === 'Enter') {
                verifyKey();
            }
        }

        async function verifyKey() {
            const key = authInput.value.trim();
            if (!key) return;

            authInput.disabled = true;
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Contacting Server...';
            authStatus.innerHTML = `<span class="text-yellow-500">Memverifikasi key untuk ${currentRepoId}...</span>`;

            const currentDeviceId = window.navigator.userAgent + (window.screen.height + window.screen.width);

            try {
                // PENTING: Ubah localhost ini juga ke IP VPS kamu nanti
                const response = await fetch('/verifyKey', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        key: key,
                        deviceId: currentDeviceId,
                        repoId: currentRepoId 
                    })
                });
                
                const result = await response.json();

if (result.success) {
                    // Beri tahu user untuk ngecek Telegram
                    authStatus.innerHTML = `<span class="text-green-500">${result.message}</span>`;
                    verifyBtn.innerHTML = '<i class="fa-solid fa-check text-green-500"></i> Cek Telegram!';
                    
                    unlockedRepos[currentRepoId] = true;
                    
                    setTimeout(() => {
                        closeAuthModal();
                        currentRepoId = '';
                    }, 3000); // Waktu diperlama dikit biar user sempat baca

                

                } else {
                    authStatus.innerHTML = `<span class="text-red-500">Error: ${result.message}</span>`;
                    verifyBtn.innerHTML = 'Execute Handshake';
                    authInput.disabled = false;
                    verifyBtn.disabled = false;
                    authInput.value = '';
                    authInput.focus();
                }
            } catch (error) {
                console.error("Gagal menghubungi server:", error);
                authStatus.innerHTML = '<span class="text-red-500">Error: Gagal terhubung ke server.</span>';
                verifyBtn.innerHTML = 'Coba Lagi';
                authInput.disabled = false;
                verifyBtn.disabled = false;
            }
        }

        // --- 7. Logika Mobile Menu (Hanya di index.html) ---
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        if (btn && menu) {
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
                const icon = btn.querySelector('i');
                if (menu.classList.contains('hidden')) {
                    icon.classList.remove('fa-xmark');
                    icon.classList.add('fa-bars');
                } else {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-xmark');
                }
            });

            const mobileLinks = menu.querySelectorAll('a');
            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    menu.classList.add('hidden');
                    btn.querySelector('i').classList.replace('fa-xmark', 'fa-bars');
                });
            });
        }
</script>
</body>
</html>
